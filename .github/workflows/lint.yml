name: Lint

on: [push, pull_request]

jobs:
  clang-format:
    name: clang-format check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install clang-format
        run: sudo apt-get update -qq && sudo apt-get install -qq clang-format-20

      - name: Check formatting
        run: python3 Scripts/run-clang-format.py
