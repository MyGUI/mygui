repos:
  - repo: local
    hooks:
      - id: clang-format
        name: clang-format check
        entry: bash -c 'if which clang-format 2>/dev/null || which clang-format-20 2>/dev/null; then exec python3 Scripts/run-clang-format.py; else echo "clang-format not installed; skipping" && exit 0; fi'
        language: system
        always_run: true
        pass_filenames: false
